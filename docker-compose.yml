services:
  api:
    build: ./backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16

    restart: always

    environment:
      POSTGRES_USER: campuseats
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campuseats

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: